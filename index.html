    // ── UTILITIES ──────────────────────────────────────────────

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function pad2(n) {
      return n < 10 ? '0' + n : String(n);
    }

    function minutesToLabel(m) {
      var h = Math.floor(m / 60);
      var min = m % 60;
      var ampm = h < 12 ? 'AM' : 'PM';
      var h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      return h12 + ':' + pad2(min) + '\u00a0' + ampm;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    function escAttr(str) {
      return String(str)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'");
    }

    // ── STORAGE ────────────────────────────────────────────────

    async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    state.records = {};

    data.forEach(row => {
      if (!row || row.length < 5) return;

      const date = String(row[0]).trim();
      const student = String(row[1]).trim();
      const time = Number(row[2]);
      const behavior = String(row[3]).trim();
      const count = Number(row[4]);

      let antecedents = [];
      if (row.length > 5 && row[5] !== '' && row[5] !== null && row[5] !== undefined) {
        const raw = String(row[5]).trim();
        try {
          const parsed = JSON.parse(raw);
          antecedents = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          antecedents = raw ? [raw] : [];
        }
      }

      let consequences = [];
      if (row.length > 6 && row[6] !== '' && row[6] !== null && row[6] !== undefined) {
        const raw = String(row[6]).trim();
        try {
          const parsed = JSON.parse(raw);
          consequences = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          consequences = raw ? [raw] : [];
        }
      }

      let functions = [];
      if (row.length > 7 && row[7] !== '' && row[7] !== null && row[7] !== undefined) {
        const raw = String(row[7]).trim();
        try {
          const parsed = JSON.parse(raw);
          functions = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          functions = raw ? [raw] : [];
        }
      }

      if (!date || !student || !behavior || isNaN(time) || isNaN(count)) return;

      if (!state.records[date]) state.records[date] = {};
      if (!state.records[date][student]) state.records[date][student] = {};
      if (!state.records[date][student][time]) state.records[date][student][time] = {};

      state.records[date][student][time][behavior] = { count, antecedents, consequences, functions };
    });

  } catch (err) {
    console.error("Failed to load data", err);
  }
}

async function saveDataEntry(date, student, minutes, behavior, count, antecedents, consequences, functions) {
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: {
      },
      body: JSON.stringify({
        date,
        student,
        time: minutes,
        behavior,
        count,
        antecedent: JSON.stringify(antecedents || []),
        consequence: JSON.stringify(consequences || []),
        function: JSON.stringify(functions || [])
      })
    });
  } catch (err) {
    console.error("Failed to save data", err);
  }
}
    // ── TIME SLOTS ─────────────────────────────────────────────

    function generateTimeSlots() {
      var slots = [];
      var startMin = 7 * 60;
      var endMin = 14 * 60 + 30;
      for (var m = startMin; m <= endMin; m += 10) {
        slots.push({
          minutes: m,
          label: minutesToLabel(m),
          hour: Math.floor(m / 60)
        });
      }
      return slots;
    }

    function groupSlotsByHour(slots) {
      var groups = {};
      slots.forEach(function (slot) {
        if (!groups[slot.hour]) groups[slot.hour] = [];
        groups[slot.hour].push(slot);
      });
      return groups;
    }

    // ── RECORDS ────────────────────────────────────────────────

    function getCount(date, student, minutes, behavior) {
      var d = state.records[date];
      if (!d) return 0;
      var s = d[student];
      if (!s) return 0;
      var t = s[minutes];
      if (!t) return 0;
      var entry = t[behavior];
      if (!entry) return 0;
      if (typeof entry === 'object') return entry.count || 0;
      return entry || 0;
    }

    function getAntecedents(date, student, minutes, behavior) {
      var d = state.records[date];
      if (!d) return [];
      var s = d[student];
      if (!s) return [];
      var t = s[minutes];
      if (!t) return [];
      var entry = t[behavior];
      if (!entry || typeof entry !== 'object') return [];
      return Array.isArray(entry.antecedents) ? entry.antecedents : [];
    }

    function getConsequences(date, student, minutes, behavior) {
      var d = state.records[date];
      if (!d) return [];
      var s = d[student];
      if (!s) return [];
      var t = s[minutes];
      if (!t) return [];
      var entry = t[behavior];
      if (!entry || typeof entry !== 'object') return [];
      return Array.isArray(entry.consequences) ? entry.consequences : [];
    }

    function getFunctions(date, student, minutes, behavior) {
      var d = state.records[date];
      if (!d) return [];
      var s = d[student];
      if (!s) return [];
      var t = s[minutes];
      if (!t) return [];
      var entry = t[behavior];
      if (!entry || typeof entry !== 'object') return [];
      return Array.isArray(entry.functions) ? entry.functions : [];
    }

    function setCount(date, student, minutes, behavior, value) {
      if (!state.records[date]) state.records[date] = {};
      if (!state.records[date][student]) state.records[date][student] = {};
      if (!state.records[date][student][minutes]) state.records[date][student][minutes] = {};

      var existing = state.records[date][student][minutes][behavior];
      var antecedents = (existing && typeof existing === 'object') ? (Array.isArray(existing.antecedents) ? existing.antecedents : []) : [];
      var consequences = (existing && typeof existing === 'object') ? (Array.isArray(existing.consequences) ? existing.consequences : []) : [];
      var functions = (existing && typeof existing === 'object') ? (Array.isArray(existing.functions) ? existing.functions : []) : [];

      state.records[date][student][minutes][behavior] = { count: value, antecedents: antecedents, consequences: consequences, functions: functions };

      saveDataEntry(date, student, minutes, behavior, value, antecedents, consequences, functions);
    }

    function toggleAntecedent(date, student, minutes, behavior, option) {
      if (!state.records[date]) state.records[date] = {};
      if (!state.records[date][student]) state.records[date][student] = {};
      if (!state.records[date][student][minutes]) state.records[date][student][minutes] = {};

      var existing = state.records[date][student][minutes][behavior];
      var count = (existing && typeof existing === 'object') ? (existing.count || 0) : (existing || 0);
      var consequences = (existing && typeof existing === 'object') ? (Array.isArray(existing.consequences) ? existing.consequences.slice() : []) : [];
      var antecedents = (existing && typeof existing === 'object') ? (Array.isArray(existing.antecedents) ? existing.antecedents.slice() : []) : [];
      var functions = (existing && typeof existing === 'object') ? (Array.isArray(existing.functions) ? existing.functions.slice() : []) : [];

      var idx = antecedents.indexOf(option);
      if (idx === -1) {
        antecedents.push(option);
      } else {
        antecedents.splice(idx, 1);
      }

      state.records[date][student][minutes][behavior] = { count: count, antecedents: antecedents, consequences: consequences, functions: functions };

      saveDataEntry(date, student, minutes, behavior, count, antecedents, consequences, functions);
    }

    function toggleConsequence(date, student, minutes, behavior, option) {
      if (!state.records[date]) state.records[date] = {};
      if (!state.records[date][student]) state.records[date][student] = {};
      if (!state.records[date][student][minutes]) state.records[date][student][minutes] = {};

      var existing = state.records[date][student][minutes][behavior];
      var count = (existing && typeof existing === 'object') ? (existing.count || 0) : (existing || 0);
      var antecedents = (existing && typeof existing === 'object') ? (Array.isArray(existing.antecedents) ? existing.antecedents.slice() : []) : [];
      var consequences = (existing && typeof existing === 'object') ? (Array.isArray(existing.consequences) ? existing.consequences.slice() : []) : [];
      var functions = (existing && typeof existing === 'object') ? (Array.isArray(existing.functions) ? existing.functions.slice() : []) : [];

      var idx = consequences.indexOf(option);
      if (idx === -1) {
        consequences.push(option);
      } else {
        consequences.splice(idx, 1);
      }

      state.records[date][student][minutes][behavior] = { count: count, antecedents: antecedents, consequences: consequences, functions: functions };

      saveDataEntry(date, student, minutes, behavior, count, antecedents, consequences, functions);
    }

    function toggleFunction(date, student, minutes, behavior, option) {
      if (!state.records[date]) state.records[date] = {};
      if (!state.records[date][student]) state.records[date][student] = {};
      if (!state.records[date][student][minutes]) state.records[date][student][minutes] = {};

      var existing = state.records[date][student][minutes][behavior];
      var count = (existing && typeof existing === 'object') ? (existing.count || 0) : (existing || 0);
      var antecedents = (existing && typeof existing === 'object') ? (Array.isArray(existing.antecedents) ? existing.antecedents.slice() : []) : [];
      var consequences = (existing && typeof existing === 'object') ? (Array.isArray(existing.consequences) ? existing.consequences.slice() : []) : [];
      var functions = (existing && typeof existing === 'object') ? (Array.isArray(existing.functions) ? existing.functions.slice() : []) : [];

      var idx = functions.indexOf(option);
      if (idx === -1) {
        functions.push(option);
      } else {
        functions.splice(idx, 1);
      }

      state.records[date][student][minutes][behavior] = { count: count, antecedents: antecedents, consequences: consequences, functions: functions };

      saveDataEntry(date, student, minutes, behavior, count, antecedents, consequences, functions);
    }

    // ── APP INIT ───────────────────────────────────────────────

async function initApp() {
  await loadData();

  const dates = Object.keys(state.records);

  if (dates.length > 0) {
    state.selectedDate = dates.sort().reverse()[0];
  }

  if (state.students.length > 0 && !state.selectedStudent) {
    state.selectedStudent = state.students[0].name;
  }

  renderApp();
}

    // ── FULL APP RENDER ────────────────────────────────────────

    function renderApp() {
      var app = document.getElementById('app');
      app.innerHTML = buildHeader() + buildMainContent() + buildNav() + '<div id="modal-overlay"></div>';
      renderModal();
    }

    function buildMainContent() {
      var inner = '';
      if (state.currentPage === 'tracker') inner = buildTrackerPage();
      else if (state.currentPage === 'summary') inner = buildSummaryPage();
      else if (state.currentPage === 'trends') inner = buildTrendsPage();
      else if (state.currentPage === 'settings') inner = buildSettingsPage();
      return '<main id="content" class="flex-1 overflow-y-auto px-4 py-2 pb-4">' + inner + '</main>';
    }

    // ── CURRENT PAGE RE-RENDER ─────────────────────────────────

    function renderPage() {
      if (state.currentPage === 'tracker') renderTracker();
      else if (state.currentPage === 'summary') renderSummary();
      else if (state.currentPage === 'trends') renderTrends();
      else if (state.currentPage === 'settings') renderSettings();
    }

    // ── HEADER ─────────────────────────────────────────────────

    function buildHeader() {
     var chips = state.students.map(function (sObj) {
      var name = sObj.name;
      var isActive = name === state.selectedStudent;
        var cls = isActive
          ? 'flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold bg-white text-blue-600'
          : 'flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-medium bg-blue-500 text-white hover:bg-blue-400';
        return '<button class="' + cls + '" onclick="selectStudent(\'' + escAttr(name) + '\')">'
          + escHtml(name)
          + '</button>';
      }).join('');

      var studentRow = chips
        ? '<div class="flex gap-2 px-4 pb-3 overflow-x-auto">' + chips + '</div>'
        : '<div class="px-4 pb-3 text-blue-200 text-xs italic">No students \u2014 add them in Settings.</div>';

      return '<header class="flex-none bg-blue-600 text-white">'
        + '<div class="px-4 pt-4 pb-2">'
        + '<h1 class="text-xl font-bold leading-tight">Behavior Tracker</h1>'
        + '<p class="text-blue-100 text-sm mt-0.5">' + formatDate(state.selectedDate) + '</p>'
        + '</div>'
        + studentRow
        + '</header>';
    }

    // ── NAV ────────────────────────────────────────────────────

    function buildNav() {
      var tabs = [
        { id: 'tracker',  label: 'Tracker',  icon: '&#128203;' },
        { id: 'summary',  label: 'Summary',  icon: '&#128202;' },
        { id: 'trends',   label: 'Trends',   icon: '&#128200;' },
        { id: 'settings', label: 'Settings', icon: '&#9881;&#65039;' }
      ];
      var items = tabs.map(function (t) {
        var active = t.id === state.currentPage;
        var cls = 'flex flex-col items-center flex-1 py-2 text-xs font-medium '
          + (active ? 'text-blue-600' : 'text-gray-500 hover:text-gray-700');
        return '<button class="' + cls + '" onclick="switchPage(\'' + t.id + '\')">'
          + '<span class="text-lg leading-none">' + t.icon + '</span>'
          + '<span class="mt-0.5">' + t.label + '</span>'
          + '</button>';
      }).join('');
      return '<nav class="flex-none bg-white border-t border-gray-200 flex">' + items + '</nav>';
    }

    // ── NAVIGATION ACTIONS ─────────────────────────────────────

    function switchPage(page) {
      state.currentPage = page;
      renderApp();
    }

    function selectStudent(student) {
      state.selectedStudent = student;
      renderApp();
    }

    // ── TRACKER PAGE ───────────────────────────────────────────

    function renderTracker() {
      var content = document.getElementById('content');
      if (content) content.innerHTML = buildTrackerPage();
    }

    function buildTrackerPage() {
      if (!state.selectedStudent) {
        return '<p class="text-center text-gray-400 mt-8 text-sm">No student selected.'
          + ' Add students in Settings.</p>';
      }
      var slots = generateTimeSlots();
      var groups = groupSlotsByHour(slots);
      var hours = Object.keys(groups).map(Number).sort(function (a, b) { return a - b; });
      return hours.map(function (h) {
        return buildHourSection(h, groups[h]);
      }).join('');
    }

    function buildHourSection(hour, slots) {
      var isOpen = !!state.expandedHours[hour];

var hourTotal = 0;

const studentObj = state.students.find(s => s.name === state.selectedStudent);
const behaviors = studentObj ? studentObj.behaviors : [];

slots.forEach(function (slot) {
  behaviors.forEach(function (bObj) {
    hourTotal += getCount(
      state.selectedDate,
      state.selectedStudent,
      slot.minutes,
      bObj.name
    );
  });
});

      var badge = hourTotal > 0
        ? '<span class="ml-2 inline-flex items-center px-1.5 py-0.5 rounded-full text-xs'
          + ' font-semibold bg-red-100 text-red-700">' + hourTotal + '</span>'
        : '';

      var firstLabel = slots[0].label;
      var lastLabel = slots[slots.length - 1].label;
      var rangeLabel = firstLabel + ' \u2013 ' + lastLabel;
      var chevron = isOpen ? '&#9650;' : '&#9660;';

      var slotContent = isOpen
        ? '<div class="divide-y divide-gray-100">' + slots.map(buildSlotRow).join('') + '</div>'
        : '';

      return '<div class="mb-2 rounded-lg border border-gray-200 overflow-hidden">'
        + '<button class="w-full flex items-center justify-between px-4 py-3 bg-gray-50'
        + ' hover:bg-gray-100 text-sm font-medium text-gray-700" onclick="toggleHour(' + hour + ')">'
        + '<span>' + rangeLabel + badge + '</span>'
        + '<span class="text-gray-400 text-xs">' + chevron + '</span>'
        + '</button>'
        + slotContent
        + '</div>';
    }

    function buildSlotRow(slot) {
      var date = state.selectedDate;
      var student = state.selectedStudent;
      var m = slot.minutes;

      var total = getSlotTotal(date, student, m);
      var badge = total > 0
        ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">' + total + '</span>'
        : '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded-full text-xs text-gray-300 bg-gray-50">0</span>';

      var dA = escAttr(date);
      var sA = escAttr(student);

      var hasNote = !!getNote(date, student, m);
      var hasAnt = getAntecedents(date, student, m, '_slot').length > 0;
      var hasCons = getConsequences(date, student, m, '_slot').length > 0;
      var hasFuncs = getFunctions(date, student, m, '_slot').length > 0;

      var fCls = 'px-2.5 py-1 rounded text-xs font-semibold bg-blue-100 text-blue-700 hover:bg-blue-200';
      var aCls = hasAnt
        ? 'px-2.5 py-1 rounded text-xs font-semibold bg-purple-100 text-purple-700 hover:bg-purple-200'
        : 'px-2.5 py-1 rounded text-xs font-medium bg-gray-100 text-gray-500 hover:bg-gray-200';
      var cCls = hasCons
        ? 'px-2.5 py-1 rounded text-xs font-semibold bg-green-100 text-green-700 hover:bg-green-200'
        : 'px-2.5 py-1 rounded text-xs font-medium bg-gray-100 text-gray-500 hover:bg-gray-200';
      var fnCls = hasFuncs
        ? 'px-2.5 py-1 rounded text-xs font-semibold bg-orange-100 text-orange-700 hover:bg-orange-200'
        : 'px-2.5 py-1 rounded text-xs font-medium bg-gray-100 text-gray-500 hover:bg-gray-200';
      var noteCls = hasNote
        ? 'px-2.5 py-1 rounded text-xs font-semibold bg-amber-100 text-amber-700 hover:bg-amber-200'
        : 'px-2.5 py-1 rounded text-xs font-medium bg-gray-100 text-gray-500 hover:bg-gray-200';

      return '<div class="flex items-center px-3 py-2 gap-2">'
        + '<span class="text-xs font-medium text-gray-600 w-16 flex-shrink-0">' + escHtml(slot.label) + '</span>'
        + badge
        + '<div class="flex-1"></div>'
        + '<div class="flex items-center gap-1.5">'
        + '<button class="' + aCls + '" aria-label="Antecedents" onclick="openModal(\'A\',\'' + dA + '\',\'' + sA + '\',' + m + ')">A</button>'
        + '<button class="' + cCls + '" aria-label="Consequences" onclick="openModal(\'C\',\'' + dA + '\',\'' + sA + '\',' + m + ')">C</button>'
        + '<button class="' + fnCls + '" aria-label="Function of Behavior" onclick="openModal(\'FN\',\'' + dA + '\',\'' + sA + '\',' + m + ')">F</button>'
        + '<button class="' + fCls + '" aria-label="Frequency and Duration" onclick="openModal(\'F\',\'' + dA + '\',\'' + sA + '\',' + m + ')">&#128203;</button>'
        + '<button class="' + noteCls + '" onclick="openModal(\'notes\',\'' + dA + '\',\'' + sA + '\',' + m + ')">&#9998;</button>'
        + '</div>'
        + '</div>';
    }

    function toggleHour(hour) {
      state.expandedHours[hour] = !state.expandedHours[hour];
      renderPage();
    }

function incr(date, student, minutes, behavior, type) {
  var cur = getCount(date, student, minutes, behavior);

  if (type === "duration") {
    cur += 0.5; // 30 seconds = 0.5 minutes
  } else {
    cur += 1;
  }

  setCount(date, student, minutes, behavior, cur);
  renderPage();
}

function decr(date, student, minutes, behavior) {
  var cur = getCount(date, student, minutes, behavior);

  if (cur > 0) {
    if (cur <= 0.5) {
      cur = 0;
    } else {
      cur -= 0.5;
    }
  }

  setCount(date, student, minutes, behavior, cur);
  renderPage();
}

    // ── SLOT HELPERS ───────────────────────────────────────────

    function getSlotTotal(date, student, minutes) {
      var studentObj = state.students.find(function(s) { return s.name === student; });
      var behaviors = studentObj ? studentObj.behaviors : [];
      var total = 0;
      behaviors.forEach(function(bObj) {
        total += getCount(date, student, minutes, bObj.name);
      });
      return total;
    }

    function getNote(date, student, minutes) {
      var d = state.slotNotes[date];
      if (!d) return '';
      var s = d[student];
      if (!s) return '';
      return s[minutes] || '';
    }

    function saveNote(date, student, minutes, text) {
      if (!state.slotNotes[date]) state.slotNotes[date] = {};
      if (!state.slotNotes[date][student]) state.slotNotes[date][student] = {};
      state.slotNotes[date][student][minutes] = text;
    }

    // ── MODAL MANAGEMENT ───────────────────────────────────────

    function openModal(type, date, student, minutes) {
      state.openModal = { type: type, date: date, student: student, minutes: minutes };
      renderModal();
    }

    function closeModal() {
      state.openModal = null;
      renderModal();
      renderTracker();
    }

    function handleModalOverlayClick(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    function renderModal() {
      var el = document.getElementById('modal-overlay');
      if (el) el.innerHTML = buildModalHtml();
    }

    function buildModalHtml() {
      if (!state.openModal) return '';
      var m = state.openModal;
      var date = m.date;
      var student = m.student;
      var minutes = m.minutes;
      var type = m.type;

      var typeLabels = { F: 'Frequency / Duration', A: 'Antecedents', C: 'Consequences', FN: 'Function of Behavior', notes: 'Notes' };
      var title = typeLabels[type] || '';
      var timeLabel = minutesToLabel(minutes);

      var content = '';
      var footer = '';

      if (type === 'F') {
        content = buildFModalContent(date, student, minutes);
      } else if (type === 'A') {
        content = buildAModalContent(date, student, minutes);
      } else if (type === 'C') {
        content = buildCModalContent(date, student, minutes);
      } else if (type === 'FN') {
        content = buildFNModalContent(date, student, minutes);
      } else if (type === 'notes') {
        content = buildNotesModalContent(date, student, minutes);
        footer = '<div class="px-4 py-3 border-t border-gray-100 flex-shrink-0 flex gap-2">'
          + '<button class="flex-1 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm font-medium hover:bg-gray-200" onclick="closeModal()">Cancel</button>'
          + '<button class="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700" onclick="saveNoteFromModal()">Save</button>'
          + '</div>';
      }

      return '<div class="fixed inset-0 z-50 bg-black bg-opacity-40 flex items-end" onclick="handleModalOverlayClick(event)">'
        + '<div role="dialog" aria-modal="true" aria-labelledby="modal-title" class="bg-white w-full max-w-lg mx-auto rounded-t-2xl shadow-2xl flex flex-col" style="max-height:70vh" onclick="event.stopPropagation()">'
        + '<div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 flex-shrink-0">'
        + '<div>'
        + '<div class="text-xs text-gray-400 font-medium">' + escHtml(timeLabel) + ' \u2014 ' + escHtml(student) + '</div>'
        + '<div id="modal-title" class="text-sm font-semibold text-gray-800">' + escHtml(title) + '</div>'
        + '</div>'
        + '<button aria-label="Close" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-bold text-sm leading-none" onclick="closeModal()">&#215;</button>'
        + '</div>'
        + '<div id="modal-content-inner" class="overflow-y-auto flex-1 px-4 py-1">' + content + '</div>'
        + footer
        + '</div>'
        + '</div>';
    }

    function buildFModalContent(date, student, minutes) {
      var studentObj = state.students.find(function(s) { return s.name === student; });
      var behaviors = studentObj ? studentObj.behaviors : [];
      var dA = escAttr(date);
      var sA = escAttr(student);

      if (!behaviors.length) {
        return '<p class="text-center text-sm text-gray-400 py-6">No behaviors configured.</p>';
      }

      return behaviors.map(function(bObj) {
        var bName = bObj.name;
        var type = bObj.type;
        var count = getCount(date, student, minutes, bName);
        var bA = escAttr(bName);
        var display = type === 'duration'
          ? (count ? count.toFixed(1) + '\u00a0min' : '0.0\u00a0min')
          : String(count);

        return '<div class="flex items-center py-2.5 border-b border-gray-100 last:border-0">'
          + '<div class="flex-1 min-w-0 mr-3">'
          + '<div class="text-sm font-medium text-gray-700 truncate">' + escHtml(bName) + '</div>'
          + '<div class="text-xs text-gray-400 capitalize">' + type + '</div>'
          + '</div>'
          + '<div class="flex items-center gap-2 flex-shrink-0">'
          + '<button class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300 font-bold text-base leading-none"'
          + ' onclick="decrModal(\'' + dA + '\',\'' + sA + '\',' + minutes + ',\'' + bA + '\',\'' + type + '\')">&#8722;</button>'
          + '<span class="w-16 text-center text-sm font-semibold tabular-nums text-gray-800">' + escHtml(display) + '</span>'
          + '<button class="w-8 h-8 flex items-center justify-center rounded-full bg-blue-500 text-white hover:bg-blue-600 font-bold text-base leading-none"'
          + ' onclick="incrModal(\'' + dA + '\',\'' + sA + '\',' + minutes + ',\'' + bA + '\',\'' + type + '\')">+</button>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    function buildAModalContent(date, student, minutes) {
      var dA = escAttr(date);
      var sA = escAttr(student);
      var current = getAntecedents(date, student, minutes, '_slot');

      return ANTECEDENT_OPTIONS.map(function(opt) {
        var checked = current.indexOf(opt) !== -1 ? ' checked' : '';
        var oA = escAttr(opt);
        return '<label class="flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0 cursor-pointer">'
          + '<input type="checkbox" class="w-4 h-4 accent-blue-600"' + checked
          + ' onchange="toggleAntecedent(\'' + dA + '\',\'' + sA + '\',' + minutes + ',\'_slot\',\'' + oA + '\')">'
          + '<span class="text-sm text-gray-700">' + escHtml(opt) + '</span>'
          + '</label>';
      }).join('');
    }

    function buildCModalContent(date, student, minutes) {
      var dA = escAttr(date);
      var sA = escAttr(student);
      var current = getConsequences(date, student, minutes, '_slot');

      return CONSEQUENCE_OPTIONS.map(function(opt) {
        var checked = current.indexOf(opt) !== -1 ? ' checked' : '';
        var oA = escAttr(opt);
        return '<label class="flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0 cursor-pointer">'
          + '<input type="checkbox" class="w-4 h-4 accent-blue-600"' + checked
          + ' onchange="toggleConsequence(\'' + dA + '\',\'' + sA + '\',' + minutes + ',\'_slot\',\'' + oA + '\')">'
          + '<span class="text-sm text-gray-700">' + escHtml(opt) + '</span>'
          + '</label>';
      }).join('');
    }

    function buildFNModalContent(date, student, minutes) {
      var dA = escAttr(date);
      var sA = escAttr(student);
      var current = getFunctions(date, student, minutes, '_slot');

      return FUNCTION_OPTIONS.map(function(opt) {
        var checked = current.indexOf(opt) !== -1 ? ' checked' : '';
        var oA = escAttr(opt);
        return '<label class="flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0 cursor-pointer">'
          + '<input type="checkbox" class="w-4 h-4 accent-blue-600"' + checked
          + ' onchange="toggleFunction(\'' + dA + '\',\'' + sA + '\',' + minutes + ',\'_slot\',\'' + oA + '\')">'
          + '<span class="text-sm text-gray-700">' + escHtml(opt) + '</span>'
          + '</label>';
      }).join('');
    }

    function buildNotesModalContent(date, student, minutes) {
      var note = getNote(date, student, minutes);
      return '<div class="py-2">'
        + '<textarea id="modal-notes-textarea"'
        + ' class="w-full h-32 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"'
        + ' placeholder="Add notes for this time slot...">'
        + escHtml(note)
        + '</textarea>'
        + '</div>';
    }

    function incrModal(date, student, minutes, behavior, type) {
      var cur = getCount(date, student, minutes, behavior);
      if (type === 'duration') cur += 0.5;
      else cur += 1;
      setCount(date, student, minutes, behavior, cur);
      var inner = document.getElementById('modal-content-inner');
      if (inner) inner.innerHTML = buildFModalContent(date, student, minutes);
    }

    function decrModal(date, student, minutes, behavior, type) {
      var cur = getCount(date, student, minutes, behavior);
      if (cur > 0) {
        var step = type === 'duration' ? 0.5 : 1;
        if (cur <= step) cur = 0;
        else cur -= step;
      }
      setCount(date, student, minutes, behavior, cur);
      var inner = document.getElementById('modal-content-inner');
      if (inner) inner.innerHTML = buildFModalContent(date, student, minutes);
    }

    function saveNoteFromModal() {
      var textarea = document.getElementById('modal-notes-textarea');
      var m = state.openModal;
      if (!m || !textarea) return;
      saveNote(m.date, m.student, m.minutes, textarea.value);
      closeModal();
    }

    // ── SUMMARY PAGE ───────────────────────────────────────────

function renderSummary() {
  var content = document.getElementById('content');
  if (content) content.innerHTML = buildSummaryPage();
}

function buildSummaryPage() {
  var date = state.selectedDate;
  var student = state.selectedStudent;

  if (!student) {
    return '<p class="text-center text-gray-400 mt-8 text-sm">No student selected.</p>';
  }

  var dayData = (state.records[date] && state.records[date][student]) || {};
  var behaviorTotals = {};
  var total = 0;

  const studentObj = state.students.find(s => s.name === student);
  const behaviors = studentObj ? studentObj.behaviors : [];

  behaviors.forEach(function (bObj) {
    behaviorTotals[bObj.name] = 0;
  });

  Object.keys(dayData).forEach(function (ts) {
    var slotData = dayData[ts];
    Object.keys(slotData).forEach(function (b) {
      var entry = slotData[b];
      var n = (entry && typeof entry === 'object') ? (entry.count || 0) : (entry || 0);
      total += n;
      if (behaviorTotals.hasOwnProperty(b)) {
        behaviorTotals[b] += n;
      }
    });
  });

  var rows = behaviors.map(function (bObj) {
    var b = bObj.name;
    var count = behaviorTotals[b] || 0;
    var pct = total > 0 ? Math.round((count / total) * 100) : 0;

    return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">'
      + '<span class="text-sm font-medium text-gray-700 flex-1 mr-4 truncate">'
      + escHtml(b)
      + '</span>'
      + '<div class="flex items-center gap-2 flex-shrink-0">'
      + '<div class="w-24 bg-gray-200 rounded-full h-2 overflow-hidden">'
      + '<div class="h-2 rounded-full bg-blue-500" style="width:' + pct + '%"></div>'
      + '</div>'
      + '<span class="text-sm font-bold text-gray-800 w-8 text-right tabular-nums">'
      + count
      + '</span>'
      + '</div>'
      + '</div>';
  }).join('');

  return '<div class="mt-2 space-y-4">'
    + '<div class="rounded-xl bg-blue-50 p-6 text-center">'
    + '<div class="text-5xl font-bold text-blue-700">' + total + '</div>'
    + '<div class="text-sm text-blue-500 mt-1 font-medium">Total Incidents</div>'
    + '<div class="text-xs text-gray-400 mt-1">'
    + escHtml(student) + ' &bull; ' + formatDate(date)
    + '</div>'
    + '</div>'
    + '<div class="bg-white rounded-lg border border-gray-200 px-4">'
    + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-3 pb-1">'
    + 'Behavior Breakdown'
    + '</h2>'
    + rows
    + '</div>'
    + '</div>';
}

    // ── TRENDS PAGE ────────────────────────────────────────────

    function renderTrends() {
      var content = document.getElementById('content');
      if (content) content.innerHTML = buildTrendsPage();
    }

    function buildTrendsPage() {
      var mode = state.trendsMode;
      var activeCls = 'px-4 py-1.5 text-sm font-medium rounded-full bg-blue-600 text-white';
      var inactiveCls = 'px-4 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200';
      var weeklyBtnCls = mode === 'weekly' ? activeCls : inactiveCls;
      var monthlyBtnCls = mode === 'monthly' ? activeCls : inactiveCls;

      var dates = getTrendDates(mode);
      var chartTitle = mode === 'weekly' ? 'Last 7 Days' : 'Last 30 Days';

      return '<div class="mt-2 space-y-4">'
        + '<div class="flex gap-2">'
        + '<button class="' + weeklyBtnCls + '" onclick="setTrendsMode(\'weekly\')">Weekly</button>'
        + '<button class="' + monthlyBtnCls + '" onclick="setTrendsMode(\'monthly\')">Monthly</button>'
        + '</div>'
        + '<div class="bg-white rounded-lg border border-gray-200 p-4">'
        + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">'
        + chartTitle
        + '</h2>'
        + buildBarChart(dates, mode)
        + '</div>'
        + '</div>';
    }

    function getTrendDates(mode) {
      var count = mode === 'weekly' ? 7 : 30;
      var dates = [];
      var today = new Date();
      for (var i = count - 1; i >= 0; i--) {
        var d = new Date(today);
        d.setDate(today.getDate() - i);
        dates.push(d.toISOString().slice(0, 10));
      }
      return dates;
    }

    function getDayTotal(dateStr) {
      var student = state.selectedStudent;
      if (!student) return 0;
      var dayData = (state.records[dateStr] && state.records[dateStr][student]) || {};
      var total = 0;
      Object.keys(dayData).forEach(function (ts) {
        Object.keys(dayData[ts]).forEach(function (b) {
          var entry = dayData[ts][b];
          total += (entry && typeof entry === 'object') ? (entry.count || 0) : (entry || 0);
        });
      });
      return total;
    }

    function buildBarChart(dates, mode) {
      var values = dates.map(getDayTotal);
      var maxVal = Math.max.apply(null, values.concat([1]));
      var today = todayStr();

      var bars = dates.map(function (d, i) {
        var val = values[i];
        var heightPct = Math.round((val / maxVal) * 100);
        var isToday = d === today;
        var barCls = isToday ? 'bg-blue-600 rounded-t' : 'bg-blue-300 rounded-t';
        var labelDate = new Date(d + 'T12:00:00');
        var label = mode === 'weekly'
          ? labelDate.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3)
          : String(labelDate.getDate());
        var valLabel = val > 0 ? String(val) : '';
        var barHeight = val > 0 ? Math.max(heightPct, 2) : 0;

        return '<div class="flex flex-col items-center flex-1">'
          + '<span class="text-xs font-semibold text-gray-600 mb-1 h-4 leading-4">'
          + valLabel
          + '</span>'
          + '<div class="w-full flex items-end justify-center" style="height:100px">'
          + '<div class="w-4/5 ' + barCls + '" style="height:' + barHeight + '%"></div>'
          + '</div>'
          + '<span class="text-xs text-gray-500 mt-1">' + label + '</span>'
          + '</div>';
      }).join('');

      return '<div class="flex items-end">' + bars + '</div>';
    }

    function setTrendsMode(mode) {
      state.trendsMode = mode;
      renderPage();
    }

    // ── SETTINGS PAGE ──────────────────────────────────────────

    function renderSettings() {
      var content = document.getElementById('content');
      if (content) content.innerHTML = buildSettingsPage();
    }

function buildSettingsPage() {
  var studentItems = state.students.length > 0
    ? state.students.map(function (s) {
        return '<div class="flex items-center justify-between py-2.5 border-b border-gray-100 last:border-0">'
          + '<span class="text-sm text-gray-700">' + escHtml(s.name) + '</span>'
          + '</div>';
      }).join('')
    : '<p class="text-xs text-gray-400 py-2 italic">No students added yet.</p>';

  return '<div class="mt-2 space-y-4 pb-4">'
    + '<div class="bg-white rounded-lg border border-gray-200 p-4">'
    + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Date</h2>'
    + '<input type="date" value="' + state.selectedDate + '"'
    + ' class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"'
    + ' onchange="changeDate(this.value)">'
    + '</div>'
    + '<div class="bg-white rounded-lg border border-gray-200 p-4">'
    + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Students</h2>'
    + studentItems
    + '</div>'
    + '<div class="bg-white rounded-lg border border-gray-200 p-4">'
    + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Behaviors</h2>'
    + '<p class="text-xs text-gray-400 italic">Behaviors are configured per student.</p>'
    + '</div>'
    + '<div class="bg-white rounded-lg border border-gray-200 p-4">'
    + '<h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Data</h2>'
    + '<p class="text-xs text-gray-400 mb-3">Permanently removes all recorded behavior data.</p>'
    + '<button class="w-full py-2.5 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600"'
    + ' onclick="clearAllData()">Clear All Data</button>'
    + '</div>'
    + '</div>';
}


    function changeDate(value) {
      state.selectedDate = value;
      renderApp();
    }

function addStudent() {
  var input = document.getElementById('newStudentInput');
  if (!input) return;

  var name = input.value.trim();
  if (!name) return;

  if (state.students.some(function (s) { return s.name === name; })) {
    alert('A student with that name already exists.');
    return;
  }

  state.students.push({
    name: name,
    behaviors: []
  });

  if (!state.selectedStudent) state.selectedStudent = name;

  renderApp();
}

function removeStudent(name) {
  state.students = state.students.filter(function (s) {
    return s.name !== name;
  });

  if (state.selectedStudent === name) {
    state.selectedStudent = state.students.length > 0 ? state.students[0].name : '';
  }

  renderApp();
}


    function clearAllData() {
      if (!confirm('Clear all recorded behavior data for all students and dates? This action cannot be undone.')) return;
      state.records = {};
      state.expandedHours = {};
      
      renderApp();
    }

    // ── BOOT ───────────────────────────────────────────────────

    initApp();
  </script>
</body>
